name: Android

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  build:
    name: NDK-R28C
    runs-on: ubuntu-latest

    steps:
    # 第一步：必须先拉取代码（修复顺序错误）
    - uses: actions/checkout@v4

    # 第二步：安装 JDK（Android 构建必需）
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 第三步：安装指定 NDK
    - name: Setup Android NDK R28C
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r28c
        add-to-path: false

    # 第四步：执行构建脚本
    - name: Build Android Project
      run: |
        cd ./scripts/build-android/
        echo "NDK Path: ${{ steps.setup-ndk.outputs.ndk-path }}"
        # 修复脚本执行命令（补全 .sh 后缀）
        chmod +x ./build-android.sh
        source ./build-android.sh -n ${{ steps.setup-ndk.outputs.ndk-path }}
