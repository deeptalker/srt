name: Android
on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

# 定义 NDK 版本（只需改这里，全局生效）
env:
  NDK_VERSION: r28c

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # =====================
      # 完全按你的写法：用环境变量 + id + outputs
      # 不写死路径 ✅
      # =====================
      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      # 执行脚本（自动传 NDK 路径）
      - name: Build Project
        run: |
          cd scripts/build-android
          chmod +x build-android
          ./build-android -n ${{ steps.setup-ndk.outputs.ndk-path }} -a 24 -t "arm64-v8a"

      # 自动收集库和头文件
      - name: Prepare Output
        run: |
          mkdir -p output/lib
          mkdir -p output/include/openssl
          mkdir -p output/include/srt

          find . -name "libsrt.a" -o -name "libssl.a" -o -name "libcrypto.a" | xargs cp -t output/lib/ || true
          find . -path "*/openssl/*.h" | xargs cp -t output/include/openssl/ || true
          find . -path "*/srt/*.h" | xargs cp -t output/include/srt/ || true

          ls -R output/

      # 自动打包 + 提供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-openssl-srt
          path: output/
